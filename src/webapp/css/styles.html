<style>
:root{
  --bg:#0c2318; --panel:#112d1e; --panel2:#163824; --line:#1e5035;
  --gold:#d4a843; --goldsft:#e8c878; --text:#e8f5ee; --dim:#87b89a;
  --good:#52b37a; --bad:#d9624a; --warn:#d4943a; --rad:10px;
  --shad:0 6px 22px rgba(0,0,0,.38);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%}
body{background:linear-gradient(160deg,#0c2318 0%,#081a11 100%);color:var(--text);
  font-family:"Inter","Segoe UI",ui-sans-serif,sans-serif;-webkit-font-smoothing:antialiased}
.mono{font-family:"IBM Plex Mono","Courier New",monospace}

/* ── header ── */
header{padding:16px 24px;display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--line);background:rgba(0,0,0,.18);
  position:sticky;top:0;z-index:30;backdrop-filter:blur(8px);flex-wrap:wrap;gap:10px}
.brand{display:flex;align-items:center;gap:10px}
.brand .logo{width:34px;height:34px;border-radius:8px;background:var(--gold);display:flex;
  align-items:center;justify-content:center;font-weight:800;color:#0c2318;font-size:15px;font-family:"IBM Plex Mono",monospace}
.brand h1{font-size:17px;font-weight:700;letter-spacing:.3px}
.brand .sub{font-size:11px;color:var(--dim);margin-top:2px}
.hdr-right{display:flex;align-items:center;gap:12px;font-size:13px;color:var(--dim);flex-wrap:wrap}
.hdr-right b{color:var(--text)}

/* ── buttons ── */
.btn{padding:8px 15px;border:1px solid var(--gold);background:transparent;color:var(--goldsft);
  border-radius:8px;font-size:13px;cursor:pointer;font-weight:600;transition:all .14s;font-family:inherit}
.btn:hover{background:var(--gold);color:#0c2318}
.btn.solid{background:var(--gold);color:#0c2318}
.btn.solid:hover{background:var(--goldsft)}
.btn.danger{border-color:var(--bad);color:var(--bad)}
.btn.danger:hover{background:var(--bad);color:#fff}
.btn.sm{padding:5px 11px;font-size:12px}
.btn:disabled{opacity:.45;cursor:default;pointer-events:none}

/* ── layout ── */
main{max-width:1040px;margin:0 auto;padding:26px 18px 80px}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:14px;margin-bottom:20px}
.card{background:linear-gradient(145deg,var(--panel2),var(--panel));border:1px solid var(--line);
  border-radius:var(--rad);padding:16px;box-shadow:var(--shad)}
.card .lbl{font-size:10.5px;text-transform:uppercase;letter-spacing:1.1px;color:var(--dim);margin-bottom:8px}
.card .val{font-size:24px;font-weight:700;font-family:"IBM Plex Mono",monospace;color:var(--goldsft)}
.card .val.bad{color:var(--bad)}.card .val.warn{color:var(--warn)}
.card .meta{font-size:11.5px;color:var(--dim);margin-top:5px}

.panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--rad);
  padding:18px;margin-bottom:18px;box-shadow:var(--shad)}
.panel h2{font-size:14.5px;font-weight:700;letter-spacing:.3px;margin-bottom:4px}
.panel .sub{font-size:12px;color:var(--dim);margin-bottom:13px}
.ph{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px;margin-bottom:13px}
.ph h2{margin-bottom:4px}
.btn-row{display:flex;gap:7px;flex-wrap:wrap}

/* ── tables ── */
table{width:100%;border-collapse:collapse;font-size:12.5px}
th,td{padding:8px 10px;text-align:left;border-bottom:1px solid var(--line);vertical-align:top}
th{color:var(--dim);font-weight:600;font-size:10.5px;text-transform:uppercase;letter-spacing:.7px}
td.r{text-align:right;font-family:"IBM Plex Mono",monospace;white-space:nowrap}
td.g{color:var(--good)} td.b{color:var(--bad)}
tr:hover td{background:rgba(255,255,255,.025)}
.empty td{text-align:center;color:var(--dim);padding:16px;font-style:italic}

.badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.3px;white-space:nowrap}
.badge.active{background:rgba(82,179,122,.18);color:var(--good)}
.badge.cleared{background:rgba(212,168,67,.18);color:var(--goldsft)}
.badge.overdue{background:rgba(217,98,74,.18);color:var(--bad)}
.badge.admin{background:rgba(212,168,67,.22);color:var(--goldsft)}
.badge.member{background:rgba(255,255,255,.07);color:var(--dim)}
.badge.pending{background:rgba(212,148,58,.18);color:var(--warn)}
.badge.approved{background:rgba(82,179,122,.18);color:var(--good)}
.badge.rejected{background:rgba(217,98,74,.18);color:var(--bad)}
.badge.unpaid{background:rgba(217,98,74,.18);color:var(--bad)}
.badge.paid{background:rgba(82,179,122,.18);color:var(--good)}

/* ── tabs ── */
.tabs{display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap}
.tab{padding:7px 15px;border-radius:8px;border:1px solid var(--line);background:transparent;
  color:var(--dim);font-size:13px;cursor:pointer;font-weight:600;font-family:inherit;transition:all .14s}
.tab.on{background:var(--gold);color:#0c2318;border-color:var(--gold)}

/* ── loan cards ── */
.loan-card{border:1px solid var(--line);border-radius:8px;padding:14px;margin-bottom:12px;background:rgba(255,255,255,.02)}
.loan-hd{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.loan-hd .lid{font-family:"IBM Plex Mono",monospace;font-weight:700;font-size:14px}
.loan-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;margin-top:10px}
.ls-k{font-size:10.5px;color:var(--dim);text-transform:uppercase;letter-spacing:.4px}
.ls-v{font-family:"IBM Plex Mono",monospace;font-weight:600;margin-top:2px;font-size:13px}
.sched{display:none;margin-top:10px}
.sched.on{display:block}
.sched table{font-size:11.5px}
.note{font-size:12px;color:var(--dim);margin-top:6px}

/* ── login ── */
.center{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.info-card{width:100%;max-width:380px;background:var(--panel);border:1px solid var(--line);
  border-radius:14px;padding:28px;box-shadow:var(--shad);text-align:center}
.info-card .logo{width:52px;height:52px;border-radius:12px;background:var(--gold);margin:0 auto 14px;
  display:flex;align-items:center;justify-content:center;font-weight:800;font-size:22px;color:#0c2318;font-family:"IBM Plex Mono",monospace}
.info-card h1{font-size:20px;margin-bottom:6px}
.info-card p{font-size:13px;color:var(--dim);line-height:1.55;margin-bottom:10px}
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:12px;text-align:left}
.field label{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--dim)}
.field input,.field select,.field textarea{padding:10px 12px;border:1px solid var(--line);border-radius:8px;
  background:#0c2318;color:var(--text);font-size:13px;font-family:inherit}
.field input:focus,.field select:focus{outline:1px solid var(--gold);border-color:var(--gold)}
.err{color:var(--bad);font-size:12.5px;min-height:16px;margin-top:6px}

/* ── modals ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;
  justify-content:center;z-index:50;padding:16px}
.modal-bg.on{display:flex}
.modal{background:var(--panel);border:1px solid var(--line);border-radius:12px;max-width:480px;
  width:100%;padding:22px;box-shadow:var(--shad);position:relative;max-height:88vh;overflow:auto}
.modal h3{font-size:16px;margin-bottom:4px}
.modal .x{position:absolute;top:13px;right:15px;border:none;background:none;font-size:20px;
  color:var(--dim);cursor:pointer}
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-top:13px}
.mgrid .full{grid-column:1/-1}
.mact{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.mst{font-size:12.5px;color:var(--dim);margin-top:8px;min-height:14px}
.mst.ok{color:var(--good)}.mst.err{color:var(--bad)}
.lim-warn{background:rgba(217,98,74,.1);border:1px solid var(--bad);border-radius:8px;
  padding:9px 12px;font-size:12.5px;margin-top:10px}

.bar{display:flex;gap:9px;margin-bottom:16px;align-items:center;flex-wrap:wrap}
.bar span{font-size:12.5px;color:var(--dim)}

.hidden{display:none!important}
@media(max-width:580px){.mgrid{grid-template-columns:1fr}}
</style>
